<!doctype html>
<html lang="en" data-theme="matcha">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(function() {
				var manual = sessionStorage.getItem('theme-manual');
				var theme;
				if (manual) {
					theme = localStorage.getItem('theme') || 'matcha';
				} else {
					var hour = new Date().getHours();
					theme = (hour >= 6 && hour < 18) ? 'matcha' : 'opus';
				}
				document.documentElement.setAttribute('data-theme', theme);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="relative min-h-screen">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
